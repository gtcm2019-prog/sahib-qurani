<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Compagnon Coranique</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#FAF6EF}/* ═══════════════════ SAHIB QURANI v2 ═══════════════════ */
#sq-app *{box-sizing:border-box;font-family:'Segoe UI',Tahoma,Georgia,sans-serif}
#sq-app{direction:rtl;background:#FAF6EF;min-height:500px;position:relative;color:#2C1F0E;overflow:hidden}
#sq-app button{cursor:pointer;transition:opacity .2s}
#sq-app button:hover{opacity:.88}
#sq-app select,#sq-app input,#sq-app textarea{font-family:inherit;outline:none;color:#2C1F0E}

/* HEADER */
.sq-header{background:linear-gradient(160deg,#0F2E2C 0%,#1B4D4A 55%,#256460 100%);padding:18px 14px 14px;text-align:center;position:relative;overflow:hidden}
.sq-geo{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.sq-header-inner{position:relative;z-index:1}
.sq-bismillah{font-size:1.8rem;letter-spacing:4px;color:#C49A28;text-shadow:0 2px 10px rgba(0,0,0,.4);margin:6px 0 2px}
.sq-title{margin:4px 0 2px;font-size:1.4rem;font-weight:700;color:#fff;font-family:Georgia,serif;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.sq-sub{margin:0 0 8px;font-size:.68rem;color:rgba(255,255,255,.6);letter-spacing:1.2px}
.sq-orn{display:flex;align-items:center;gap:5px;margin:5px 0}
.sq-orn-line{flex:1;height:1px}
.sq-tabs{display:flex;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.sq-tab{border-radius:22px;padding:5px 14px;font-size:.71rem;font-weight:500;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}
.sq-tab.active{background:#C49A28;color:#0F2E2C;font-weight:700;border-color:#C49A28}

/* BODY */
.sq-body{max-width:700px;margin:0 auto;padding:16px 12px 48px;position:relative;z-index:1}

/* PANELS */
.sq-panel{background:#fff;border-radius:14px;border:1.5px solid #C9A96E;padding:15px;margin-bottom:12px;box-shadow:0 2px 10px rgba(44,32,21,.08);position:relative;overflow:hidden}
.sq-sec-head{display:flex;align-items:center;gap:7px;margin-bottom:14px}
.sq-sec-line{flex:1;height:1px}
.sq-sec-head span{font-size:.74rem;font-weight:700;color:#1B4D4A;letter-spacing:.7px}
.sq-corner{position:absolute;top:0;right:0;opacity:.18;pointer-events:none}
.sq-corner-l{position:absolute;top:0;left:0;opacity:.18;pointer-events:none;transform:scaleX(-1)}

/* FILTER GRID */
.sq-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sq-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sq-full{grid-column:1/-1}
.sq-lbl{font-size:.62rem;color:#9A7A55;margin-bottom:3px;font-weight:600}
.sq-sel{width:100%;background:#fff;border:1.5px solid #C9A96E;border-radius:8px;padding:7px 10px;font-size:.8rem;font-weight:600;appearance:none;cursor:pointer}
.sq-inp{width:100%;background:#fff;border:1.5px solid #C9A96E;border-radius:8px;padding:7px 10px;font-size:.8rem}

/* RIWAYA TOGGLE */
.sq-riw-btns{display:flex;gap:7px}
.sq-riw-btn{flex:1;padding:7px 4px;border-radius:8px;font-weight:700;font-size:.7rem;text-align:center;border:1.5px solid #C9A96E;background:#F4EDD8;color:#1B4D4A}
.sq-riw-btn.hafs{background:#EEF7EE;color:#1A4A1A}.sq-riw-btn.warsh{background:#EEF0F7;color:#1A2A5C}
.sq-riw-btn.hafs.on{background:#D5EDD5;border-color:#5A9A5A}.sq-riw-btn.warsh.on{background:#D5D8ED;border-color:#5A70AA}
.sq-riw-btn.all.on{background:#EBE0C8;border-color:#A0720A}

/* SAHIB STATUS TOGGLE */
.sq-sahib-btns{display:flex;gap:7px}
.sq-sahib-btn{flex:1;padding:7px 4px;border-radius:8px;font-weight:700;font-size:.7rem;text-align:center;border:1.5px solid #C9A96E;background:#F4EDD8;color:#1B4D4A}
.sq-sahib-btn.on{background:#D5EDD5;border-color:#5A9A5A;color:#1A4A1A}
.sq-sahib-btn.off{background:#EEF0F7;border-color:#5A70AA;color:#1A2A5C}
.sq-sahib-btn.all.active{background:#EBE0C8;border-color:#A0720A}
.sq-sahib-btn.off.active{background:#D5D8ED;border-color:#5A70AA}
.sq-sahib-btn.on.active{background:#D5EDD5;border-color:#5A9A5A}

/* SEARCH BUTTON */
.sq-btn-search{width:100%;background:linear-gradient(135deg,#1B4D4A,#256460);color:#fff;border:none;border-radius:9px;padding:10px;font-size:.82rem;font-weight:700;letter-spacing:.4px;box-shadow:0 3px 12px rgba(27,77,74,.28);margin-top:11px}

/* RESULTS */
.sq-results-bar{display:flex;justify-content:space-between;margin-bottom:9px;padding:0 2px;font-size:.68rem;color:#9A7A55}

/* CARD */
.sq-card{background:#fff;border-radius:13px;border:1.5px solid #C9A96E;padding:13px 14px;cursor:pointer;margin-bottom:9px;box-shadow:0 2px 7px rgba(44,32,21,.07);transition:all .2s;position:relative;overflow:hidden}
.sq-card:hover{border-color:#C49A28;box-shadow:0 5px 20px rgba(160,114,10,.16)}
.sq-card.flagged{border-color:#C8A858}.sq-card.banned{border-color:#C08888}
.sq-card.has-sahib{border-color:#9A9A9A;opacity:.75}
.sq-card-row{display:flex;gap:11px;align-items:flex-start}

/* AVATAR — Rose femme, Rouge homme */
.sq-av{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:21px;border:2.5px solid}
.sq-av.f{background:linear-gradient(135deg,#FDEEF6,#F8D0E8);border-color:#D4569A}
.sq-av.m{background:linear-gradient(135deg,#FDEAEA,#F8C8C8);border-color:#C0392B}

/* GENDER BADGE */
.sq-gender-f{color:#D4569A;font-size:.62rem;font-weight:700}
.sq-gender-m{color:#C0392B;font-size:.62rem;font-weight:700}

.sq-card-info{flex:1;min-width:0}
.sq-card-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:3px}
.sq-card-name{font-weight:700;font-size:.92rem;color:#2C1F0E}
.sq-card-name.red{color:#8B2020}.sq-card-name.orange{color:#7A4800}
.sq-card-meta{font-size:.66rem;color:#9A7A55;margin-top:1px}
.sq-chips{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.sq-card-bio{margin-top:6px;font-size:.7rem;color:#6B5030;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* SAHIB FOUND BADGE */
.sq-sahib-badge{background:#F0F0F0;color:#888;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:10px;border:1px solid #ccc}
.sq-sahib-badge.found{background:#E8F8EE;color:#1A5C30;border-color:#70B888}

/* CHIPS */
.sq-chip{display:inline-flex;align-items:center;border-radius:18px;font-size:.62rem;font-weight:700;padding:2px 8px;border:1px solid;line-height:1.4;white-space:nowrap}
.sq-chip.trusted{background:#E8F8EE;color:#1A5C30;border-color:#70B888}
.sq-chip.flagged-c{background:#FFF8E8;color:#7A4800;border-color:#C8A050}
.sq-chip.banned-c{background:#FDECEC;color:#8B2020;border-color:#D09090}
.sq-chip.hafs{background:#EAF5EA;color:#1A4A1A;border-color:#5A9A5A}
.sq-chip.warsh{background:#EAF0F8;color:#1A2A5C;border-color:#5A70AA}
.sq-chip.beginner{background:#EAF5EE;color:#1A5C30;border-color:#70B888}
.sq-chip.mid{background:#FFF9E8;color:#7A5A00;border-color:#C0A030}
.sq-chip.adv{background:#F2EAF8;color:#4A2080;border-color:#9060C0}
.sq-chip.hafiz{background:#E8F2F8;color:#1A3A6C;border-color:#5080B0}
.sq-chip.muted{background:#F4EDD8;color:#1B4D4A;border-color:#C9A96E}
.sq-chip.age{background:#FFF0F8;color:#8B2060;border-color:#D490B0}
.sq-chip.female{background:#FDE8F4;color:#C0356A;border-color:#D4569A}
.sq-chip.male{background:#FDE8E8;color:#A02828;border-color:#C0392B}

/* STARS */
.sq-stars{color:#C49A28;font-size:.73rem}
.sq-stars span{color:#6B5030;font-size:.67rem;margin-right:2px}
.sq-stars.lg{font-size:.95rem}
.sq-no-rating{color:#9A7A55;font-size:.68rem}

/* PROFILE HERO */
.sq-hero{padding:20px 16px 16px;text-align:center;position:relative;overflow:hidden}
.sq-hero.f{background:linear-gradient(160deg,#3A1030,#6A2050,#8A3068)}
.sq-hero.m{background:linear-gradient(160deg,#200A0A,#4A1010,#701818)}
.sq-hero-inner{position:relative;z-index:1}
.sq-hero-av{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 10px;box-shadow:0 4px 14px rgba(0,0,0,.3);border:3px solid}
.sq-hero-av.f{background:linear-gradient(135deg,#FDEEF6,#F0C0E0);border-color:#FFB8DE}
.sq-hero-av.m{background:linear-gradient(135deg,#FDEAEA,#F0C0C0);border-color:#FFB8B8}
.sq-hero-name{font-weight:700;color:#fff;font-size:1.08rem;font-family:Georgia,serif;margin-top:4px}
.sq-hero-sub{font-size:.68rem;color:rgba(255,255,255,.65);margin:3px 0 7px}
.sq-hero-since{font-size:.58rem;color:rgba(255,255,255,.4);margin-top:2px}
.sq-hero-chips{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.sq-hero-stats{display:flex;justify-content:center;gap:22px;margin-top:12px}
.sq-stat-n{font-weight:700;font-size:1.05rem}
.sq-hero.f .sq-stat-n{color:#FFB8DE}
.sq-hero.m .sq-stat-n{color:#FFB8B8}
.sq-stat-l{font-size:.58rem;color:rgba(255,255,255,.5)}

/* SAHIB STATUS SECTION IN PROFILE */
.sq-sahib-section{border-radius:10px;padding:12px 14px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.sq-sahib-section.free{background:#EEF8EE;border:1.5px solid #7ABE7A}
.sq-sahib-section.found{background:#F0F0F0;border:1.5px solid #BBBBBB}
.sq-sahib-section-text{font-size:.8rem;font-weight:700}
.sq-sahib-section.free .sq-sahib-section-text{color:#1A5C30}
.sq-sahib-section.found .sq-sahib-section-text{color:#666}
.sq-btn-sahib{border:none;border-radius:8px;padding:7px 14px;font-size:.75rem;font-weight:700;cursor:pointer}
.sq-btn-sahib.mark{background:linear-gradient(135deg,#1A5C30,#2A8040);color:#fff}
.sq-btn-sahib.unmark{background:#ddd;color:#666}

/* SUBTABS */
.sq-subtabs{display:flex;border-bottom:1.5px solid #EBE0C8}
.sq-subtab{flex:1;background:#fff;color:#9A7A55;border:none;border-bottom:2.5px solid transparent;padding:10px 4px;font-size:.7rem;cursor:pointer;font-weight:500;transition:all .2s}
.sq-subtab.active{background:#F4EDD8;color:#1B4D4A;font-weight:700;border-bottom-color:#C49A28}
.sq-tab-body{padding:16px}

/* INFO BLOCKS */
.sq-info-block{background:#F4EDD8;border-radius:10px;padding:12px 13px;border-right:3px solid #C49A28;margin-bottom:12px}
.sq-info-lbl{font-size:.65rem;color:#A0720A;font-weight:700;margin-bottom:4px}
.sq-info-text{font-size:.8rem;color:#2C1F0E;line-height:1.8}
.sq-riw-block{border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:12px}
.sq-riw-block.hafs{background:#EEF8EE;border:1.5px solid #7ABE7A}
.sq-riw-block.warsh{background:#EEF0F8;border:1.5px solid #7090C8}
.sq-riw-icon{font-size:1.7rem}
.sq-riw-name{font-weight:700;font-size:.86rem}
.sq-riw-zone{font-size:.68rem;color:#9A7A55;margin-top:2px}
.sq-range-block{background:#F4EDD8;border-radius:10px;padding:12px 13px;margin-bottom:12px}
.sq-range-flex{display:flex;align-items:center;justify-content:space-between;gap:7px}
.sq-range-item{text-align:center;flex:1}
.sq-range-lbl{font-size:.58rem;color:#9A7A55;margin-bottom:3px}
.sq-range-val{background:#fff;border:1.5px solid #C9A96E;border-radius:7px;padding:6px 9px;font-weight:700;color:#1B4D4A;font-size:.78rem}
.sq-range-count{background:#1B4D4A;border-radius:7px;padding:6px 13px;font-weight:700;color:#fff;font-size:.95rem}
.sq-alert{border-radius:9px;padding:11px 13px;font-size:.76rem;line-height:1.7;margin-bottom:12px}
.sq-alert.danger{background:#FEF0F0;border:1.5px solid #C89090;color:#8B2020}
.sq-alert.warn{background:#FFFBF0;border:1.5px solid #C8A850;color:#7A4800}
.sq-success-box{background:#EEF9F3;border:1.5px solid #80C0A0;border-radius:9px;padding:12px;text-align:center}
.sq-back-btn{background:#fff;border:1.5px solid #C9A96E;color:#1B4D4A;border-radius:8px;padding:5px 13px;font-size:.7rem;cursor:pointer;margin-bottom:12px;font-weight:600;box-shadow:0 1px 4px rgba(44,32,21,.08)}
.sq-btn-primary{width:100%;background:linear-gradient(135deg,#1B4D4A,#256460);color:#fff;border:none;border-radius:9px;padding:10px;font-size:.85rem;font-weight:700;box-shadow:0 3px 12px rgba(27,77,74,.25)}
.sq-wa-btn{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:.83rem;font-weight:700;text-decoration:none}

/* REVIEWS */
.sq-rate-panel{background:#F4EDD8;border-radius:9px;border:1.5px solid #C9A96E;padding:13px;margin-bottom:11px}
.sq-star-row{display:flex;gap:5px;direction:ltr;margin-bottom:7px}
.sq-star{font-size:1.75rem;cursor:pointer;color:#EBE0C8;transition:color .12s}
.sq-star.on{color:#C49A28}
.sq-review-card{background:#F4EDD8;border-radius:8px;border:1px solid #EBE0C8;padding:10px 12px;margin-bottom:7px}
.sq-review-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.sq-reviewer{font-weight:700;color:#2C1F0E;font-size:.76rem}
.sq-review-text{font-size:.74rem;color:#6B5030;line-height:1.6}
.sq-review-date{font-size:.6rem;color:#9A7A55;margin-top:3px}
.sq-textarea{width:100%;background:#fff;border:1.5px solid #C9A96E;border-radius:8px;padding:7px 11px;font-size:.78rem;resize:vertical;line-height:1.7;margin-bottom:7px}
.sq-btn-sm{border:none;border-radius:7px;padding:7px 18px;font-size:.76rem;font-weight:700;cursor:pointer}
.sq-btn-sm.on{background:linear-gradient(135deg,#1B4D4A,#256460);color:#fff}
.sq-btn-sm.off{background:rgba(27,77,74,.1);color:#9A7A55;cursor:not-allowed}

/* REPORT */
.sq-report-warn{background:#FEF0F0;border:1.5px solid #C89090;border-radius:8px;padding:10px 12px;font-size:.73rem;color:#8B2020;line-height:1.7;margin-bottom:10px}
.sq-old-rep-item{background:#FFF8F0;border:1px solid #C8A850;border-radius:7px;padding:8px 10px;margin-bottom:5px;font-size:.71rem;color:#6B5030}
.sq-btn-rep{width:100%;border-radius:8px;padding:8px;font-size:.8rem;font-weight:700;cursor:pointer}
.sq-btn-rep.on{background:linear-gradient(135deg,#8B2020,#6A1010);color:#fff;border:1px solid #8B2020}
.sq-btn-rep.off{background:#FDECEC;color:#C09090;border:1px solid #C08888;cursor:not-allowed}

/* REGISTER */
.sq-form-grp{margin-bottom:10px}
.sq-form-lbl{font-size:.66rem;color:#9A7A55;margin-bottom:3px;font-weight:600}
.sq-riw-cards{display:flex;gap:9px;margin-top:5px}
.sq-riw-card{flex:1;padding:11px 7px;border-radius:10px;cursor:pointer;text-align:center;border:2px solid #C9A96E;transition:all .2s}
.sq-riw-card.hafs{background:#EEF8EE}.sq-riw-card.warsh{background:#EEF0F8}
.sq-riw-card.hafs.on{background:#D5EDD5;border-color:#6AB06A}
.sq-riw-card.warsh.on{background:#D5D8ED;border-color:#6A80B8}
.sq-riw-card-icon{font-size:1.6rem;margin-bottom:2px}
.sq-riw-card-name{font-weight:700;font-size:.75rem}
.sq-riw-card-name.hafs{color:#1A4A1A}.sq-riw-card-name.warsh{color:#1A2A5C}
.sq-riw-card-zone{font-size:.6rem;color:#9A7A55;margin-top:2px}
.sq-success{text-align:center;padding:28px 10px}
.sq-success-icon{width:60px;height:60px;border-radius:50%;background:#1B4D4A;border:3px solid #C49A28;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 12px}
.sq-success-title{color:#1B4D4A;font-weight:700;font-family:Georgia,serif}
.sq-success-txt{color:#9A7A55;font-size:.74rem;margin-top:5px;line-height:1.8}
.sq-err{color:#8B2020;font-size:.76rem;margin-bottom:7px;display:none}

/* GUIDE */
.sq-guide-step{display:flex;gap:11px;margin-bottom:12px;align-items:flex-start}
.sq-step-ic{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1B4D4A,#256460);display:flex;align-items:center;justify-content:center;font-size:.88rem;flex-shrink:0;color:#fff;box-shadow:0 2px 7px rgba(27,77,74,.25)}
.sq-step-title{font-weight:700;color:#1B4D4A;font-size:.83rem;margin-bottom:2px}
.sq-step-desc{font-size:.73rem;color:#6B5030;line-height:1.7}
.sq-hadith-text{font-size:.86rem;color:#0F2E2C;line-height:2.1;font-family:Georgia,serif;text-align:center;margin:9px auto;padding:0 15px}
.sq-hadith-src{font-size:.66rem;color:#9A7A55}
.sq-empty{text-align:center;padding:36px;color:#9A7A55;font-size:.82rem}
.sq-loading{text-align:center;padding:28px;color:#9A7A55;font-size:.82rem}

/* MOBILE */
@media(max-width:480px){
  .sq-grid2{grid-template-columns:1fr}
  .sq-grid3{grid-template-columns:1fr 1fr}
  .sq-riw-cards{flex-direction:column}
}

/* ── LEAFLET MAP ── */
.leaflet-container{font-family:'Segoe UI',Tahoma,sans-serif}
#sq-leaflet-map,#sq-reg-map{z-index:1}
.sq-map-wrap{border-radius:10px;overflow:hidden;margin-bottom:13px;border:1.5px solid #C9A96E}
.sq-loc-btn{background:#1B4D4A;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:.75rem;cursor:pointer;margin-top:5px;display:inline-flex;align-items:center;gap:5px}
.sq-loc-label{font-size:.72rem;color:#1B4D4A;margin-top:4px;min-height:18px}
#sq-app{direction:ltr}</style>
</head>

<div style="background:#0F2E2C;padding:7px;text-align:center;display:flex;justify-content:center;gap:6px;flex-wrap:wrap"><a href="sahib-qurani-ar.html" style="background:rgba(255,255,255,0.12);color:#fff;padding:5px 14px;border-radius:16px;text-decoration:none;font-size:.73rem;font-weight:400;border:1px solid rgba(255,255,255,0.25)">🇸🇦 العربية</a><a href="sahib-qurani-en.html" style="background:rgba(255,255,255,0.12);color:#fff;padding:5px 14px;border-radius:16px;text-decoration:none;font-size:.73rem;font-weight:400;border:1px solid rgba(255,255,255,0.25)">🇬🇧 English</a><a href="sahib-qurani-fr.html" style="background:#C49A28;color:#0F2E2C;padding:5px 14px;border-radius:16px;text-decoration:none;font-size:.73rem;font-weight:700;border:1px solid #C49A28">🇫🇷 Français</a><a href="sahib-qurani-es.html" style="background:rgba(255,255,255,0.12);color:#fff;padding:5px 14px;border-radius:16px;text-decoration:none;font-size:.73rem;font-weight:400;border:1px solid rgba(255,255,255,0.25)">🇪🇸 Español</a></div>
<div id="sq-app">
  <div class="sq-header">
    <svg class="sq-geo" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="sqgp" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse"><polygon points="28,3 31,20 46,14 36,25 53,28 36,31 46,42 31,36 28,53 25,36 10,42 20,31 3,28 20,25 10,14 25,20" fill="none" stroke="#C49A28" stroke-width="0.5" opacity="0.13"/><circle cx="28" cy="28" r="1.8" fill="#C49A28" opacity="0.1"/></pattern></defs><rect width="100%" height="100%" fill="url(#sqgp)"/></svg>
    <div class="sq-header-inner">
      <div id="sq-orn-top"></div>

  r=parseFloat(r);var s="",i;
  for(i=0;i<Math.floor(r);i++)s+="\u2605";for(i=Math.floor(r);i<5;i++)s+="\u2606";
  return'<span class="sq-stars'+(lg?" lg":"")+'">'+s+'<span>'+r.toFixed(1)+'</span></span>';
}

function riwChip(id,lg){

function trustChip(m,sm){
  var f=sm?"0.58rem":"0.62rem",px=sm?"5px":"8px";
  if(isB(m))return'<span class="sq-chip banned-c" style="font-size:'+f+';padding:1px '+px+'">\u26D4 Banni</span>';
  if(isF(m))return'<span class="sq-chip flagged-c" style="font-size:'+f+';padding:1px '+px+'">\u26A0\uFE0F Avertissement</span>';
  if(m.total_ratings>=2&&m.avg_rating>=4.5)return'<span class="sq-chip trusted" style="font-size:'+f+';padding:1px '+px+'">\u2705 Fiable</span>';
  return"";
}

function ajax(action,data,cb){
  // If WordPress backend exists, use it
  var cfg=window.SQ_CONFIG||{};
  if(cfg.ajax_url){
    var fd=new FormData();
    fd.append('action',action);fd.append('nonce',cfg.nonce||'');
    for(var k in data)fd.append(k,data[k]);
    fetch(cfg.ajax_url,{method:'POST',body:fd})
      .then(function(r){return r.json();})
      .then(function(res){cb(res.success,res.data);})
      .catch(function(e){cb(false,''+e);});
    return;
  }
  // Supabase mode
  sqSupabaseAction(action,data,cb);
}

function sbFetch(method, path, body){
  return fetch(SUPABASE_URL+'/rest/v1/'+path, {
    method: method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer '+SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(t);});
    return r.json().catch(function(){return [];});
  });
}

function sqSupabaseAction(action,data,cb){
  try{
    if(action==='sq_get_members'){
      // Build query filters
      var params = 'status=eq.active&order=created_at.desc&limit=100';
      if(data.gender && data.gender!=='')   params+='&gender=eq.'+encodeURIComponent(data.gender);
      if(data.level && data.level!=='')     params+='&level_hifz=eq.'+encodeURIComponent(data.level);
      if(data.method && data.method!=='')   params+='&method=eq.'+encodeURIComponent(data.method);
      if(data.time && data.time!=='')       params+='&avail_time=eq.'+encodeURIComponent(data.time);
      if(data.country && data.country!=='') params+='&country=eq.'+encodeURIComponent(data.country);
      if(data.riwaya && data.riwaya!=='')   params+='&riwaya=eq.'+encodeURIComponent(data.riwaya);
      if(data.age_group && data.age_group!=='') params+='&age_group=eq.'+encodeURIComponent(data.age_group);
      if(data.language && data.language!=='')   params+='&language=eq.'+encodeURIComponent(data.language);
      if(data.has_sahib==='0') params+='&has_sahib=eq.0';
      if(data.has_sahib==='1') params+='&has_sahib=eq.1';

      sbFetch('GET','members?'+params).then(function(members){
        // Get ratings for all members
        sbFetch('GET','ratings?select=*').then(function(ratings){
          members.forEach(function(m){
            var mRatings = ratings.filter(function(r){return r.member_id==m.id;});
            m.ratings = mRatings;
            m.avg_rating = mRatings.length ? (mRatings.reduce(function(s,r){return s+r.stars;},0)/mRatings.length).toFixed(1) : 0;
            m.total_ratings = mRatings.length;
            m.reports = [];
          });
          cb(true, members);
        }).catch(function(){ cb(true, members); });
      }).catch(function(e){ cb(false,''+e); });
      return;
    }

    if(action==='sq_register'){
      var age = parseInt(data.age)||0;
      var ag = age<8?'Under 8':age<=12?'8-12':age<=17?'13-17':age<=24?'18-24':age<=34?'25-34':age<=44?'35-44':age<=54?'45-54':'55+';
      // Arabic age groups for AR version
      if(CUR_LANG==='ar'){
        ag = age<8?'أقل من 8':age<=12?'8-12':age<=17?'13-17':age<=24?'18-24':age<=34?'25-34':age<=44?'35-44':age<=54?'45-54':'55+';
      }
      var newM = {
        name: data.name, age: age, age_group: ag,
        gender: data.gender, country: data.country, city: data.city||'',
        language: data.language||'', level_hifz: data.level, riwaya: data.riwaya,
        surah_from: parseInt(data.surah_from)||1, surah_to: parseInt(data.surah_to)||114,
        avail_time: data.avail_time||'', method: data.method||'',
        bio: data.bio||'', email: data.email||'', whatsapp: data.whatsapp||'',
        lat: data.lat||null, lng: data.lng||null,
        avatar_url: data.avatar_url||null,
        has_sahib: 0, report_count: 0, status: 'active'
      };
      sbFetch('POST','members',newM).then(function(res){
        var member = Array.isArray(res) ? res[0] : res;
        // Save member id in localStorage for later use (mark sahib, etc.)
        localStorage.setItem('sq_my_id', member.id);
        cb(true, {id: member.id, name: member.name});
      }).catch(function(e){ cb(false,''+e); });
      return;
    }

    if(action==='sq_rate'){
      var rating = {
        member_id: parseInt(data.member_id),
        stars: parseInt(data.stars),
        comment: data.comment||'',
        reviewer: data.reviewer||'Member'
      };
      sbFetch('POST','ratings',rating).then(function(){
        sbFetch('GET','ratings?member_id=eq.'+data.member_id).then(function(rs){
          var avg = rs.length ? (rs.reduce(function(s,r){return s+r.stars;},0)/rs.length).toFixed(1) : 0;
          cb(true,{avg:avg,count:rs.length});
        });
      }).catch(function(e){ cb(false,''+e); });
      return;
    }

    if(action==='sq_report'){
      var report = {
        member_id: parseInt(data.member_id),
        reason: data.reason||'',
        details: data.details||''
      };
      sbFetch('POST','reports',report).then(function(){
        // Count reports and update member if needed
        sbFetch('GET','reports?member_id=eq.'+data.member_id).then(function(rs){
          var count = rs.length;
          var updates = {report_count: count};
          if(count>=2) updates.status='banned';
          sbFetch('PATCH','members?id=eq.'+data.member_id, updates).then(function(){
            cb(true,{count:count,banned:count>=2});
          });
        });
      }).catch(function(e){ cb(false,''+e); });
      return;
    }

    if(action==='sq_mark_sahib'){
      sbFetch('PATCH','members?id=eq.'+data.member_id, {has_sahib:parseInt(data.has_sahib)})
        .then(function(){ cb(true,{has_sahib:data.has_sahib}); })
        .catch(function(e){ cb(false,''+e); });
      return;
    }

    cb(false,'Unknown action');
  }catch(e){cb(false,''+e);}
}

window.sqUploadAvatar = function(file, cb){
  var ext = file.name.split('.').pop();
  var filename = 'avatar_'+Date.now()+'.'+ext;
  fetch(SUPABASE_URL+'/storage/v1/object/avatars/'+filename, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer '+SUPABASE_KEY,
      'Content-Type': file.type
    },
    body: file
  }).then(function(r){
    if(!r.ok) throw new Error('Upload failed');
    var url = SUPABASE_URL+'/storage/v1/object/public/avatars/'+filename;
    cb(true, url);
  }).catch(function(e){ cb(false,''+e); });
};


/* ── MAP via pure iframe — ZERO JS library, ZERO CSP issues ── */
function osmEmbed(lat,lng,h){
  lat=parseFloat(lat);lng=parseFloat(lng);h=h||220;
  var bbox=(lng-0.15)+','+(lat-0.1)+','+(lng+0.15)+','+(lat+0.1);
  var src='https://www.openstreetmap.org/export/embed.html?bbox='+bbox+'&layer=mapnik&marker='+lat+','+lng;
  var link='https://www.openstreetmap.org/?mlat='+lat+'&mlon='+lng+'#map=13/'+lat+'/'+lng;
  return '<div style="border-radius:10px;overflow:hidden;border:1.5px solid #C9A96E;margin-bottom:4px;height:'+h+'px;position:relative">'
    +'<iframe width="100%" height="'+(h+40)+'" frameborder="0" scrolling="no" src="'+src+'" style="display:block;position:absolute;top:0;left:0"></iframe>'
    +'</div>'
    +'<div style="text-align:left;margin-bottom:8px"><a href="'+link+'" target="_blank" style="font-size:.62rem;color:#9A7A55">🗺️ OpenStreetMap</a></div>';
}

function setRegMap(lat,lng){
  S.rgLat=lat;S.rgLng=lng;
  var la=ge('rg-lat'),ln=ge('rg-lng');
  if(la)la.value=lat;if(ln)ln.value=lng;
  // Update iframe immediately - no re-render needed
  var mc=ge('sq-reg-map');
  if(mc){
    mc.style.background='#e8f0e8';
    mc.innerHTML=osmEmbed(lat,lng,220);
  }
}

  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=parseFloat(pos.coords.latitude.toFixed(5));

    // Show map

/* ═══════════════ AVATAR CROP SYSTEM ═══════════════ */
/* No IIFE — needs access to S and renderRegister */

var CR = {
  img:null, src:'',
  cw:0, ch:0,
  ix:0, iy:0, iw:0, ih:0,
  cx:0, cy:0, cs:0,
  drag:null, mx:0, my:0,
  scale:1,
  canvas:null, ctx:null,
  bound:false
};

function sqCropInjectModal(){
  if(document.getElementById('sq-crop-modal')) return;
  var el=document.createElement('div');
  el.id='sq-crop-modal';
  el.style.cssText='display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.82);align-items:center;justify-content:center;padding:12px';
  el.innerHTML=
    '<div style="background:#1A1A1A;border-radius:16px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.7)">'
    +'<div style="background:linear-gradient(135deg,#0F2E2C,#1B4D4A);padding:12px 16px;display:flex;align-items:center;justify-content:space-between">'
    +'<span style="color:#C49A28;font-weight:700;font-size:.85rem">✂️ Recadrer la photo</span>'
    +'<button onclick="sqCropCancel()" style="background:none;border:none;color:rgba(255,255,255,.6);font-size:1.2rem;cursor:pointer;line-height:1">✕</button>'
    +'</div>'
    +'<div style="padding:12px;text-align:center">'
    +'<canvas id="sq-crop-canvas" style="border-radius:8px;cursor:crosshair;max-width:100%;touch-action:none;display:block;margin:0 auto"></canvas>'
    +'<div style="margin-top:8px;display:flex;align-items:center;gap:8px;justify-content:center">'
    +'<span style="color:#9A7A55;font-size:.65rem">🔍</span>'
    +'<input type="range" id="sq-crop-zoom" min="10" max="300" value="100" style="flex:1;accent-color:#C49A28" oninput="sqCropZoom(this.value)">'
    +'<span style="color:#9A7A55;font-size:.65rem">🔎</span>'
    +'</div>'
    +'<div style="color:rgba(255,255,255,.4);font-size:.62rem;margin-top:4px">Faites glisser le cadre • Déplacez la photo • Zoom</div>'
    +'</div>'
    +'<div style="padding:0 12px 14px;display:flex;gap:8px">'
    +'<button onclick="sqCropCancel()" style="flex:1;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:9px;font-size:.78rem;cursor:pointer">Annuler</button>'
    +'<button onclick="sqCropConfirm()" style="flex:2;background:linear-gradient(135deg,#1B4D4A,#256460);color:#fff;border:none;border-radius:8px;padding:9px;font-size:.78rem;font-weight:700;cursor:pointer">✅ Valider la photo</button>'
    +'</div>'
    +'</div>';
  document.body.appendChild(el);
}

function sqCropFitImage(){
  var zoom=CR.scale;
  var iR=CR.img.naturalWidth/CR.img.naturalHeight;
  var cR=CR.cw/CR.ch;
  var bW,bH;
  if(iR>cR){bH=CR.ch;bW=bH*iR;}else{bW=CR.cw;bH=bW/iR;}
  CR.iw=Math.round(bW*zoom);
  CR.ih=Math.round(bH*zoom);
}

function sqCropDraw(){
  var c=CR.ctx,cv=CR.canvas;
  if(!c||!cv) return;
  c.clearRect(0,0,CR.cw,CR.ch);

  // 1. Draw image
  c.drawImage(CR.img,CR.ix,CR.iy,CR.iw,CR.ih);

  // 2. Dark overlay outside crop circle
  c.save();
  c.fillStyle='rgba(0,0,0,0.58)';
  c.beginPath();
  c.rect(0,0,CR.cw,CR.ch);
  // Cut out circle using even-odd
  c.arc(CR.cx+CR.cs/2,CR.cy+CR.cs/2,CR.cs/2,0,Math.PI*2,true);
  c.fill('evenodd');
  c.restore();

  // 3. Redraw image inside circle (sharp)
  c.save();
  c.beginPath();
  c.arc(CR.cx+CR.cs/2,CR.cy+CR.cs/2,CR.cs/2,0,Math.PI*2);
  c.clip();
  c.drawImage(CR.img,CR.ix,CR.iy,CR.iw,CR.ih);
  c.restore();

  // 4. Border
  c.strokeStyle='#C49A28';
  c.lineWidth=2.5;
  c.setLineDash([6,4]);
  c.beginPath();
  c.arc(CR.cx+CR.cs/2,CR.cy+CR.cs/2,CR.cs/2,0,Math.PI*2);
  c.stroke();
  c.setLineDash([]);

  // 5. Corner handles
  [[CR.cx,CR.cy],[CR.cx+CR.cs,CR.cy],[CR.cx,CR.cy+CR.cs],[CR.cx+CR.cs,CR.cy+CR.cs]].forEach(function(p){
    c.fillStyle='#C49A28';c.beginPath();c.arc(p[0],p[1],6,0,Math.PI*2);c.fill();
    c.fillStyle='#fff';c.beginPath();c.arc(p[0],p[1],3.5,0,Math.PI*2);c.fill();
  });
}

function sqCropDist(ax,ay,bx,by){return Math.sqrt((ax-bx)*(ax-bx)+(ay-by)*(ay-by));}

function sqCropHit(x,y){
  var hw=16;
  if(sqCropDist(x,y,CR.cx,CR.cy)<hw) return 'tl';
  if(sqCropDist(x,y,CR.cx+CR.cs,CR.cy)<hw) return 'tr';
  if(sqCropDist(x,y,CR.cx,CR.cy+CR.cs)<hw) return 'bl';
  if(sqCropDist(x,y,CR.cx+CR.cs,CR.cy+CR.cs)<hw) return 'br';
  if(sqCropDist(x,y,CR.cx+CR.cs/2,CR.cy+CR.cs/2)<CR.cs/2) return 'crop';
  return 'img';
}

function sqCropPos(e){
  var r=CR.canvas.getBoundingClientRect();
  var sx=CR.cw/r.width, sy=CR.ch/r.height;
  var src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
}

function sqCropDown(e){
  e.preventDefault();
  var p=sqCropPos(e);
  CR.drag=sqCropHit(p.x,p.y);
  CR.mx=p.x;CR.my=p.y;
}
function sqCropMove(e){
  e.preventDefault();
  if(!CR.drag) return;
  var p=sqCropPos(e);
  var dx=p.x-CR.mx,dy=p.y-CR.my;
  CR.mx=p.x;CR.my=p.y;
  var minS=50;
  if(CR.drag==='img'){CR.ix+=dx;CR.iy+=dy;}
  else if(CR.drag==='crop'){
    CR.cx=Math.max(0,Math.min(CR.cw-CR.cs,CR.cx+dx));
    CR.cy=Math.max(0,Math.min(CR.ch-CR.cs,CR.cy+dy));
  }else if(CR.drag==='tl'){var ns=CR.cs-dx;if(ns<minS)return;CR.cx+=dx;CR.cy+=dy;CR.cs=ns;}
  else if(CR.drag==='tr'){var ns=CR.cs+dx;if(ns<minS)return;CR.cy+=dy;CR.cs=ns;}
  else if(CR.drag==='bl'){var ns=CR.cs-dx;if(ns<minS)return;CR.cx+=dx;CR.cs=ns;}
  else if(CR.drag==='br'){var ns=CR.cs+dx;if(ns<minS)return;CR.cs=ns;}
  CR.cs=Math.min(CR.cs,CR.cw-CR.cx,CR.ch-CR.cy);
  CR.cx=Math.max(0,Math.min(CR.cw-CR.cs,CR.cx));
  CR.cy=Math.max(0,Math.min(CR.ch-CR.cs,CR.cy));
  sqCropDraw();
}
function sqCropUp(){CR.drag=null;}

function sqCropBindEvents(){
  var cv=CR.canvas;
  cv.addEventListener('mousedown',sqCropDown);
  cv.addEventListener('mousemove',sqCropMove);
  cv.addEventListener('mouseup',sqCropUp);
  cv.addEventListener('mouseleave',sqCropUp);
  cv.addEventListener('touchstart',sqCropDown,{passive:false});
  cv.addEventListener('touchmove',sqCropMove,{passive:false});
  cv.addEventListener('touchend',sqCropUp);
  cv.addEventListener('wheel',function(e){
    e.preventDefault();
    sqCropApplyZoom(CR.scale*(e.deltaY>0?0.9:1.1));
  },{passive:false});
}

function sqCropApplyZoom(z){
  z=Math.max(0.1,Math.min(5,z));
  var cx=CR.cw/2,cy=CR.ch/2;
  CR.ix=cx+(CR.ix-cx)*(z/CR.scale);
  CR.iy=cy+(CR.iy-cy)*(z/CR.scale);
  CR.scale=z;
  sqCropFitImage();
  sqCropDraw();
}

window.sqCropZoom=function(val){
  sqCropApplyZoom(val/100);
};

function sqCropOpen(src){
  sqCropInjectModal();
  CR.src=src;
  CR.scale=1;
  CR.ix=0;CR.iy=0;
  CR.drag=null;
  CR.img=new Image();
  CR.img.onload=function(){
    var modal=document.getElementById('sq-crop-modal');
    var canvas=document.getElementById('sq-crop-canvas');
    CR.canvas=canvas;
    CR.ctx=canvas.getContext('2d');

    var maxW=Math.min(340,window.innerWidth-48);
    var ratio=CR.img.naturalWidth/CR.img.naturalHeight;
    CR.cw=maxW;
    CR.ch=Math.round(maxW/(ratio>1?ratio:1));
    if(CR.ch>380){CR.ch=380;CR.cw=Math.round(380*ratio);}
    if(CR.cw>maxW){CR.cw=maxW;CR.ch=Math.round(maxW/ratio);}
    canvas.width=CR.cw;
    canvas.height=CR.ch;
    canvas.style.width=CR.cw+'px';
    canvas.style.height=CR.ch+'px';

    document.getElementById('sq-crop-zoom').value=100;
    sqCropFitImage();

    // Center image
    CR.ix=Math.round((CR.cw-CR.iw)/2);
    CR.iy=Math.round((CR.ch-CR.ih)/2);

    // Crop square: centered, 65% of min dim
    var s=Math.round(Math.min(CR.cw,CR.ch)*0.65);
    CR.cs=s;
    CR.cx=Math.round((CR.cw-s)/2);
    CR.cy=Math.round((CR.ch-s)/2);

    sqCropDraw();
    sqCropBindEvents();
    modal.style.display='flex';
  };
  CR.img.src=src;
}

window.sqCropConfirm=function(){
  var out=document.createElement('canvas');
  out.width=260;out.height=260;
  var oc=out.getContext('2d');

  // Circle clip
  oc.beginPath();
  oc.arc(130,130,130,0,Math.PI*2);
  oc.clip();

  var scaleX=CR.img.naturalWidth/CR.iw;
  var scaleY=CR.img.naturalHeight/CR.ih;
  var sx=(CR.cx-CR.ix)*scaleX;
  var sy=(CR.cy-CR.iy)*scaleY;
  var sw=CR.cs*scaleX;
  var sh=CR.cs*scaleY;
  oc.drawImage(CR.img,sx,sy,sw,sh,0,0,260,260);

  window.S.rgAvatar=out.toDataURL('image/jpeg',0.82);

  sqCropCancel();

  // Update preview in DOM directly (fast, no re-render flash)
  var preview=document.getElementById('sq-avatar-preview');
  if(preview){
    preview.innerHTML='<img src="'+window.S.rgAvatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
    preview.style.border='2.5px solid #C49A28';
  }
  var lbl=document.getElementById('sq-avatar-lbl');
  if(lbl){
    var kb=Math.round(window.S.rgAvatar.length*0.75/1024);
    lbl.textContent='✅ Photo prête ('+kb+' KB)';
  }
  // Add delete button if not present
  var delBtn=document.getElementById('sq-avatar-del');
  if(!delBtn){
    var btnArea=document.getElementById('sq-avatar-btn-area');
    if(btnArea){
      var b=document.createElement('button');
      b.id='sq-avatar-del';
      b.type='button';
      b.onclick=window.sqRemoveAvatar;
      b.style.cssText='display:block;margin-top:5px;background:none;border:1px solid #C9A96E;color:#9A7A55;font-size:.68rem;border-radius:6px;padding:3px 10px;cursor:pointer';
      b.textContent='✕ حذف';
      btnArea.appendChild(b);
    }
  }
};

window.sqCropCancel=function(){
  var m=document.getElementById('sq-crop-modal');
  if(m)m.style.display='none';
  var inp=document.getElementById('sq-avatar-input');
  if(inp&&!window.S.rgAvatar)inp.value='';
};

window.sqPreviewAvatar=function(input){
  var file=input.files[0];
  if(!file) return;
  if(file.size>10*1024*1024){
    var lbl=document.getElementById('sq-avatar-lbl');
    if(lbl)lbl.textContent='❌ Fichier trop grand (max 10MB)';
    return;
  }
  var reader=new FileReader();
  reader.onload=function(e){sqCropOpen(e.target.result);};
  reader.readAsDataURL(file);
};

window.sqRemoveAvatar=function(){
  window.S.rgAvatar='';
  if(typeof renderRegister==="function")renderRegister();
};
